<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شراء كتاب - نظام إدارة المكتبة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #1cc88a;
        }
        body {
            background-color: #f8f9fc;
            font-family: 'Tajawal', sans-serif;
        }
        .navbar {
            background-color: var(--primary-color);
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }
        .card-header {
            background-color: var(--primary-color);
            color: white;
            border-radius: 10px 10px 0 0 !important;
        }
        .btn-success {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }
    </style>
</head>
<body>
<!-- شريط التنقل -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="fas fa-book-reader me-2"></i>
            نظام إدارة المكتبة
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">الرئيسية</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/books}">الكتب</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('LIBRARIAN')">
                    <a class="nav-link" th:href="@{/members}">الأعضاء</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('LIBRARIAN')">
                    <a class="nav-link" th:href="@{/borrowings}">الاستعارات</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('LIBRARIAN')">
                    <a class="nav-link" th:href="@{/purchases}">طلبات الشراء</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('MEMBER')">
                    <a class="nav-link" th:href="@{/borrowings/my-history}">سجل استعاراتي</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link btn btn-outline-light btn-sm text-white px-3" th:href="@{/logout}">
                        <i class="fas fa-sign-out-alt me-1"></i> تسجيل الخروج
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- المحتوى الرئيسي -->
<div class="container">
    <div th:if="${message}" class="alert" th:classappend="${alertClass}" role="alert">
        <span th:text="${message}"></span>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow mb-4">
                <div class="card-header py-3 bg-success">
                    <h6 class="m-0 font-weight-bold text-white" sec:authorize="hasRole('LIBRARIAN')">تفاصيل الشراء</h6>
                    <h6 class="m-0 font-weight-bold text-white" sec:authorize="hasRole('MEMBER')">تفاصيل طلب الشراء</h6>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <h5><i class="fas fa-book"></i> كتاب: <span th:text="${book.title}"></span></h5>
                        <p class="mb-0">المؤلف: <span th:text="${book.author}"></span></p>
                        <p class="mb-0 fw-bold">السعر: <span th:text="${book.price}"></span> $</p>
                    </div>
                    
                    <form th:action="@{/purchases/buy}" method="post">
                        <input type="hidden" name="bookId" th:value="${book.id}">
                        
                        <div class="mb-3" sec:authorize="hasRole('MEMBER')">
                            <label class="form-label">العضو المشترك</label>
                            <input type="text" class="form-control" th:value="${currentMember.name}" readonly>
                            <input type="hidden" name="memberId" th:value="${currentMemberId}">
                        </div>

                        <div class="mb-3" sec:authorize="hasRole('LIBRARIAN')">
                            <label for="memberId" class="form-label">اختر العضو *</label>
                            <select class="form-select" id="memberId" name="memberId" required>
                                <option value="">-- اختر العضو --</option>
                                <option th:each="member : ${members}"
                                        th:value="${member.id}"
                                        th:text="${member.name}"
                                        th:selected="${member.id == currentMemberId}"></option>
                            </select>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="deliveryRequired" onchange="toggleAddress()">
                            <label class="form-check-label" for="deliveryRequired">أرغب بتوصيل الكتاب إلى عنواني</label>
                        </div>

                        <div class="mb-3" id="addressDiv" style="display: none;">
                            <label for="deliveryAddress" class="form-label">عنوان التوصيل</label>
                            <textarea class="form-control" id="deliveryAddress" name="deliveryAddress" rows="2"></textarea>
                            <div class="form-text">يرجى كتابة عنوان التوصيل بالتفصيل لتسليم الكتاب المباع</div>
                        </div>

                        <script>
                            function toggleAddress() {
                                var checkbox = document.getElementById("deliveryRequired");
                                var addressDiv = document.getElementById("addressDiv");
                                addressDiv.style.display = checkbox.checked ? "block" : "none";
                            }
                        </script>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/books}" class="btn btn-secondary">إلغاء</a>
                            <button type="submit" class="btn btn-success" sec:authorize="hasRole('LIBRARIAN')">
                                <i class="fas fa-check me-1"></i> إتمام عملية الشراء
                            </button>
                            <button type="submit" class="btn btn-success" sec:authorize="hasRole('MEMBER')">
                                <i class="fas fa-paper-plane me-1"></i> إرسال طلب الشراء
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
