<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة المكتبة</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fc; font-family: 'Tajawal', sans-serif; }
        .login-card { border: none; border-radius: 10px; box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15); margin-top: 100px; }
        .btn-primary { background-color: #4e73df; border-color: #4e73df; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card login-card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-book-reader fa-3x text-primary mb-3"></i>
                        <h1 class="h4 text-gray-900 mb-4">مرحباً بعودتك!</h1>
                    </div>
                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <span th:text="${error}"></span>
                    </div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <input type="text" class="form-control form-control-user" name="username" placeholder="اسم المستخدم" required>
                        </div>
                        <div class="mb-4">
                            <input type="password" class="form-control form-control-user" name="password" placeholder="كلمة المرور" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-user">
                            تسجيل الدخول
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
